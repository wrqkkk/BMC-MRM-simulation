name: Unpack simulation notebooks

on:
  push:
    paths:
      - '.notebooks_payload.part*'

permissions:
  contents: write

jobs:
  unpack:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Reconstruct and extract notebooks
        shell: bash
        run: |
          cat .notebooks_payload.part* > notebooks.tar.gz.b64
          base64 -d notebooks.tar.gz.b64 > notebooks.tar.gz
          tar -xzf notebooks.tar.gz
      - name: Remove transport files
        shell: bash
        run: rm -f notebooks.tar.gz notebooks.tar.gz.b64 .notebooks_payload.part*
